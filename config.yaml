dataset:
  train_csv: data/train.csv
  text_col: text
  title_col: title
  label_col: label
  positive_label: real

sklearn:
  test_size: 0.2
  random_state: 42
  max_features: 50000
  ngram_range: [1, 2]
  C: 2.0
  penalty: l2
  solver: liblinear


transformer:
  model_name: distilbert-base-uncased
  max_length: 256
  epochs: 2
  batch_size: 16
  lr: 2e-5
